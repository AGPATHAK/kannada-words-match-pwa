<html lang="en">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      :root {
        color-scheme: light;
        --bg: #f5efe4;
        --panel: rgba(255, 252, 246, 0.9);
        --panel-strong: #fffdf9;
        --border: #dbcdb3;
        --border-strong: #bfa46f;
        --text: #2b2116;
        --muted: #6f604c;
        --accent: #9d5c2f;
        --accent-soft: #f2dfc9;
        --selected: #f3cf9d;
        --selected-shadow: rgba(157, 92, 47, 0.24);
        --matched-bg: #dff3df;
        --matched-border: #67956b;
        --matched-text: #214526;
        --error-bg: #fbe0dc;
        --error-border: #bf5f4e;
        --error-text: #7d2e21;
        --shadow: 0 14px 36px rgba(90, 63, 28, 0.11);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", Avenir, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.75), transparent 35%),
          linear-gradient(180deg, #f8f2e8 0%, var(--bg) 55%, #efe4d1 100%);
        color: var(--text);
      }

      .app {
        width: min(100%, 1080px);
        margin: 0 auto;
        padding: 16px 14px 20px;
      }

      .hero,
      .board {
        background: var(--panel);
        border: 1px solid rgba(191, 164, 111, 0.35);
        border-radius: 22px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(8px);
      }

      .hero {
        padding: 14px 16px;
      }

      .hero-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.95rem, 4.2vw, 2.9rem);
        line-height: 0.96;
        letter-spacing: -0.03em;
      }

      .progress-count {
        flex: 0 0 auto;
        color: var(--muted);
        font-size: 0.95rem;
        font-weight: 700;
        white-space: nowrap;
      }

      .hero-controls {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 12px;
      }

      .hero-status {
        min-width: 0;
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.32;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        margin-top: 12px;
      }

      .summary-card {
        padding: 10px 12px;
        border: 1px solid rgba(191, 164, 111, 0.32);
        border-radius: 16px;
        background: rgba(255, 253, 249, 0.74);
      }

      .summary-title {
        margin: 0 0 8px;
        color: var(--text);
        font-size: 0.86rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .summary-list {
        display: grid;
        gap: 5px;
      }

      .summary-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        color: var(--muted);
        font-size: 0.88rem;
        line-height: 1.25;
      }

      .summary-row strong {
        color: var(--text);
        font-weight: 700;
      }

      .board {
        margin-top: 12px;
        padding: 14px;
      }

      .board-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .column {
        min-width: 0;
      }

      .column-header {
        display: flex;
        align-items: baseline;
        justify-content: flex-start;
        gap: 0;
        margin-bottom: 8px;
      }

      .column-header h2 {
        margin: 0;
        font-size: 1rem;
      }

      .tile-list {
        display: grid;
        gap: 8px;
      }

      .tile {
        position: relative;
        overflow: hidden;
        padding: 12px 14px;
        border-radius: 16px;
        border: 1px solid var(--border);
        background: var(--panel-strong);
        cursor: pointer;
        transition:
          transform 160ms ease,
          border-color 160ms ease,
          box-shadow 160ms ease,
          background 160ms ease,
          opacity 160ms ease;
      }

      .tile:hover {
        transform: translateY(-1px);
      }

      .tile::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(157, 92, 47, 0.05), transparent 45%);
        pointer-events: none;
      }

      .tile.kannada-tile {
        background: linear-gradient(180deg, #fffdfa 0%, #faf2e4 100%);
      }

      .tile.english-tile {
        background: linear-gradient(180deg, #fffdfb 0%, #f7efe5 100%);
      }

      .tile.selected {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px var(--selected-shadow);
        background: linear-gradient(180deg, #fff5e8 0%, #f9e6ca 100%);
      }

      .tile.incorrect {
        border-color: var(--error-border);
        box-shadow: 0 0 0 4px rgba(191, 95, 78, 0.18);
        background: linear-gradient(180deg, var(--error-bg) 0%, #f8d4ce 100%);
        color: var(--error-text);
      }

      .tile.matched {
        border-color: var(--matched-border);
        background: linear-gradient(180deg, var(--matched-bg) 0%, #cfeccc 100%);
        color: var(--matched-text);
        box-shadow: 0 0 0 4px rgba(103, 149, 107, 0.14);
      }

      .tile.matched::after {
        background: linear-gradient(135deg, rgba(53, 123, 66, 0.1), transparent 50%);
      }

      .tile.disabled {
        cursor: default;
      }

      .tile.disabled:hover {
        transform: none;
      }

      .tile-label {
        margin: 0;
        font-size: clamp(1.14rem, 1.7vw, 1.26rem);
        font-weight: 700;
        line-height: 1.08;
      }

      .tile-support {
        min-height: 1.18em;
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 0.86rem;
        line-height: 1.18;
      }

      .tile-meta {
        display: none;
      }

      button {
        appearance: none;
        border: 1px solid rgba(255, 250, 242, 0.24);
        border-radius: 999px;
        padding: 10px 17px;
        min-height: 40px;
        font: inherit;
        font-weight: 700;
        letter-spacing: 0.01em;
        color: #fffaf2;
        background: linear-gradient(180deg, #ad6938 0%, var(--accent) 100%);
        cursor: pointer;
        opacity: 1;
        transition:
          transform 160ms ease,
          opacity 160ms ease,
          box-shadow 160ms ease,
          background 160ms ease,
          border-color 160ms ease;
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 18px rgba(157, 92, 47, 0.18);
      }

      button:focus-visible {
        outline: 3px solid rgba(157, 92, 47, 0.28);
        outline-offset: 3px;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.7;
        box-shadow: none;
      }

      button:disabled:hover {
        transform: none;
      }

      .button-secondary {
        color: var(--accent);
        background: linear-gradient(180deg, #f6e6d1 0%, var(--accent-soft) 100%);
      }

      @media (min-width: 760px) {
        .app {
          padding: 14px 18px 16px;
        }

        .summary-grid {
          grid-template-columns: 1fr 1fr;
        }

        .board-grid {
          grid-template-columns: 1fr 1fr;
          gap: 12px;
        }

        .hero {
          padding: 12px 16px 13px;
        }

        .board {
          padding: 12px 14px;
        }
      }

      @media (min-width: 1024px) {
        .app {
          padding-top: 12px;
          padding-bottom: 14px;
        }

        .hero {
          padding: 11px 15px 12px;
        }

        .board {
          padding: 12px;
        }

        .tile {
          padding: 11px 13px;
        }
      }

      @media (max-width: 759px) {
        .hero-header,
        .hero-controls {
          align-items: flex-start;
          flex-direction: column;
        }

        .hero-controls {
          gap: 10px;
        }
      }
    </style>
  </head>

    <main class="app">

      </section>
    </main>

        shuffle(items) {
          const copy = [...items];

          for (let index = copy.length - 1; index > 0; index -= 1) {
            const swapIndex = Math.floor(Math.random() * (index + 1));
            const current = copy[index];
            copy[index] = copy[swapIndex];
            copy[swapIndex] = current;
          }

          return copy;
        },

        createRound() {
          const kannadaPairs = Deck.shuffle(Deck.starterDataset).slice(
            0,
            AppConfig.roundSize
          );
          let englishPairs = Deck.shuffle(kannadaPairs);

          while (
            AppConfig.roundSize > 1 &&
            englishPairs.every((pair, index) => pair.id === kannadaPairs[index].id)
          ) {
            englishPairs = Deck.shuffle(kannadaPairs);
          }

          return { kannadaPairs, englishPairs };
        }
      };

      const Storage = {
        data: null,
        isAvailable() {
          try {
            const probeKey = "__kannada_match_storage_probe__";
            window.localStorage.setItem(probeKey, "1");
            window.localStorage.removeItem(probeKey);
            return true;
          } catch (_error) {
            return false;
          }
        },

        createDefaultMeta() {
          return {
            schema_version: AppConfig.storageSchemaVersion,
            last_session_at: null,
            session_count: 0
          };
        },

        createDefaultSettings() {
          return {
            show_devanagari: true
          };
        },

        createDefaultStats() {
          return {};
        },

        createDefaultData() {
          return {
            meta: Storage.createDefaultMeta(),
            // Per-word learner stats will live here instead of being mixed into deck items.
            stats: Storage.createDefaultStats(),
            settings: Storage.createDefaultSettings()
          };
        },

        readJson(key) {
          try {
            const rawValue = window.localStorage.getItem(key);

            if (rawValue === null) {
              return { exists: false, value: null, isValid: true };
            }

            return {
              exists: true,
              value: JSON.parse(rawValue),
              isValid: true
            };
          } catch (_error) {
            return { exists: true, value: null, isValid: false };
          }
        },

        sanitizeMeta(rawMeta) {
          const fallbackMeta = Storage.createDefaultMeta();

          if (!rawMeta || typeof rawMeta !== "object" || Array.isArray(rawMeta)) {
            return { value: fallbackMeta, didRecover: true, isCompatible: false };
          }

          if (rawMeta.schema_version !== AppConfig.storageSchemaVersion) {
            return { value: fallbackMeta, didRecover: true, isCompatible: false };
          }

          return {
            value: {
              schema_version: AppConfig.storageSchemaVersion,
              last_session_at:
                typeof rawMeta.last_session_at === "string" ||
                rawMeta.last_session_at === null
                  ? rawMeta.last_session_at
                  : null,
              session_count:
                Number.isInteger(rawMeta.session_count) && rawMeta.session_count >= 0
                  ? rawMeta.session_count
                  : 0
            },
            didRecover: false,
            isCompatible: true
          };
        },

        sanitizeSettings(rawSettings) {
          const fallbackSettings = Storage.createDefaultSettings();

          if (
            !rawSettings ||
            typeof rawSettings !== "object" ||
            Array.isArray(rawSettings)
          ) {
            return { value: fallbackSettings, didRecover: true };
          }

          return {
            value: {
              show_devanagari:
                typeof rawSettings.show_devanagari === "boolean"
                  ? rawSettings.show_devanagari
                  : fallbackSettings.show_devanagari
            },
            didRecover: false
          };
        },

        sanitizeStats(rawStats) {
          if (!rawStats || typeof rawStats !== "object" || Array.isArray(rawStats)) {
            return { value: Storage.createDefaultStats(), didRecover: true };
          }

          const sanitizedStats = {};

          Object.entries(rawStats).forEach(([wordId, entry]) => {
            if (!entry || typeof entry !== "object" || Array.isArray(entry)) {
              return;
            }

            sanitizedStats[wordId] = {
              seen: Number.isInteger(entry.seen) && entry.seen >= 0 ? entry.seen : 0,
              correct:
                Number.isInteger(entry.correct) && entry.correct >= 0
                  ? entry.correct
                  : 0,
              incorrect:
                Number.isInteger(entry.incorrect) && entry.incorrect >= 0
                  ? entry.incorrect
                  : 0,
              forced_completion:
                Number.isInteger(entry.forced_completion) &&
                entry.forced_completion >= 0
                  ? entry.forced_completion
                  : 0,
              streak:
                Number.isInteger(entry.streak) && entry.streak >= 0 ? entry.streak : 0,
              bucket:
                Number.isInteger(entry.bucket) && entry.bucket >= 1 ? entry.bucket : 1,
              last_reviewed:
                typeof entry.last_reviewed === "string" || entry.last_reviewed === null
                  ? entry.last_reviewed
                  : null
            };
          });

          return { value: sanitizedStats, didRecover: false };
        },

        load() {
          if (!Storage.isAvailable()) {
            Storage.data = Storage.createDefaultData();
            return Storage.data;
          }

          const metaRecord = Storage.readJson(AppConfig.storageKeys.meta);
          const metaResult = Storage.sanitizeMeta(metaRecord.value);
          let didRecover =
            !metaRecord.exists || !metaRecord.isValid || metaResult.didRecover;

          let statsResult = {
            value: Storage.createDefaultStats(),
            didRecover: true
          };
          let settingsResult = {
            value: Storage.createDefaultSettings(),
            didRecover: true
          };

          if (metaResult.isCompatible) {
            const statsRecord = Storage.readJson(AppConfig.storageKeys.stats);
            const settingsRecord = Storage.readJson(AppConfig.storageKeys.settings);

            statsResult = Storage.sanitizeStats(statsRecord.value);
            settingsResult = Storage.sanitizeSettings(settingsRecord.value);

            didRecover =
              didRecover ||
              !statsRecord.exists ||
              !statsRecord.isValid ||
              statsResult.didRecover ||
              !settingsRecord.exists ||
              !settingsRecord.isValid ||
              settingsResult.didRecover;
          } else {
            didRecover = true;
          }

          Storage.data = {
            meta: metaResult.value,
            stats: statsResult.value,
            settings: settingsResult.value
          };

          if (didRecover) {
            Storage.save();
          }

          return Storage.data;
        },

        touchSession() {
          if (!Storage.data) {
            Storage.data = Storage.createDefaultData();
          }

          Storage.data.meta.session_count += 1;
          Storage.data.meta.last_session_at = new Date().toISOString();
          Storage.save();
        },

        ensureWordStat(wordId) {
          if (!Storage.data) {
            Storage.data = Storage.createDefaultData();
          }

          if (!Storage.data.stats[wordId]) {
            // Keep the stat shape ready for later milestones, including recall-vs-elimination
            // distinctions for the final forced pair.
            Storage.data.stats[wordId] = {
              seen: 0,
              correct: 0,
              incorrect: 0,
              forced_completion: 0,
              streak: 0,
              bucket: 1,
              last_reviewed: null
            };
          }

          return Storage.data.stats[wordId];
        },

        markRoundSeen(round) {
          if (!round) {
            return;
          }

          round.kannadaPairs.forEach((pair) => {
            const stat = Storage.ensureWordStat(pair.id);
            stat.seen += 1;
          });

          Storage.save();
        },

        markIncorrectAttempt(pairIds) {
          const reviewedAt = new Date().toISOString();

          pairIds.forEach((pairId) => {
            const stat = Storage.ensureWordStat(pairId);
            stat.incorrect += 1;
            stat.streak = 0;
            stat.last_reviewed = reviewedAt;
          });

          Storage.save();
        },

        markCorrectMatch(pairId, options = {}) {
          const stat = Storage.ensureWordStat(pairId);
          stat.last_reviewed = new Date().toISOString();

          if (options.isForcedCompletion) {
            stat.forced_completion += 1;
          } else {
            stat.correct += 1;
            stat.streak += 1;
          }

          Storage.save();
        },

        save() {
          if (!Storage.isAvailable() || !Storage.data) {
            return;
          }

          try {
            window.localStorage.setItem(
              AppConfig.storageKeys.meta,
              JSON.stringify(Storage.data.meta)
            );
            window.localStorage.setItem(
              AppConfig.storageKeys.stats,
              JSON.stringify(Storage.data.stats)
            );
            window.localStorage.setItem(
              AppConfig.storageKeys.settings,
              JSON.stringify(Storage.data.settings)
            );
          } catch (_error) {
            // Ignore quota or availability errors so gameplay never breaks.
          }
        }
      };

      const State = {
        round: Deck.createRound(),
        selectedKannadaId: null,
        selectedEnglishId: null,
        matchedPairIds: new Set(),
        incorrectPairIds: new Set(),
        isFeedbackLocked: false,
        isRoundComplete: false,
        incorrectResetTimerId: null,
        sessionSummary: {
          roundsPlayed: 0,
          wordsSeen: 0,
          directCorrectMatches: 0,
          incorrectAttempts: 0,
          forcedCompletions: 0
        },

        clearSelections() {
          State.selectedKannadaId = null;
          State.selectedEnglishId = null;
          State.incorrectPairIds.clear();
        },

        resetRoundUi() {
          if (State.incorrectResetTimerId !== null) {
            window.clearTimeout(State.incorrectResetTimerId);
          }

          State.selectedKannadaId = null;
          State.selectedEnglishId = null;
          State.matchedPairIds = new Set();
          State.incorrectPairIds = new Set();
          State.isFeedbackLocked = false;
          State.isRoundComplete = false;
          State.incorrectResetTimerId = null;
        },

        startNewRound() {
          State.round = Deck.createRound();
          State.resetRoundUi();
          Storage.markRoundSeen(State.round);
          State.sessionSummary.wordsSeen += State.round.kannadaPairs.length;
        }
      };

      const UI = {
        elements: {
          kannadaList: document.getElementById("kannada-list"),
          englishList: document.getElementById("english-list"),
          datasetCount: document.getElementById("dataset-count"),
          statusMessage: document.getElementById("status-message"),
          newRoundButton: document.getElementById("new-round-button"),
          sessionSummary: document.getElementById("session-summary"),
          aggregateSummary: document.getElementById("aggregate-summary")
        },

        createTile(content) {
          const article = document.createElement("article");
          article.className = "tile " + content.variant;
          article.dataset.pairId = content.pairId;
          article.dataset.tileType = content.tileType;
          article.setAttribute("role", "button");
          article.setAttribute("tabindex", content.disabled ? "-1" : "0");
          article.setAttribute("aria-disabled", content.disabled ? "true" : "false");

          const label = document.createElement("p");
          label.className = "tile-label";
          label.textContent = content.label;
          article.appendChild(label);

          if (content.support !== undefined && content.support !== null) {
            const support = document.createElement("p");
            support.className = "tile-support";
            support.textContent = content.support;
            article.appendChild(support);
          }

          const meta = document.createElement("p");
          meta.className = "tile-meta";
          meta.textContent = content.meta;
          article.appendChild(meta);

          if (content.stateClasses.length > 0) {
            article.classList.add(...content.stateClasses);
          }

          return article;
        },

        getTileStateClasses(tileType, pairId) {
          const stateClasses = [];
          const isSelected =
            (tileType === "kannada" && State.selectedKannadaId === pairId) ||
            (tileType === "english" && State.selectedEnglishId === pairId);

          if (State.matchedPairIds.has(pairId)) {
            stateClasses.push("matched", "disabled");
          } else if (State.incorrectPairIds.has(pairId)) {
            stateClasses.push("incorrect");
          } else if (isSelected) {
            stateClasses.push("selected");
          }

          return stateClasses;
        },

        getStatusMessage() {
          if (State.isRoundComplete) {
            return "Round complete. All 5 pairs are matched. Start a new round when you are ready.";
          }

          if (State.isFeedbackLocked) {
            return "Not a match. Try again in a moment.";
          }

          if (State.selectedKannadaId && State.selectedEnglishId) {
            return "Checking the selected pair.";
          }

          if (State.selectedKannadaId) {
            return "Kannada selected. Now choose the matching English meaning.";
          }

          if (State.selectedEnglishId) {
            return "English selected. Now choose the matching Kannada word.";
          }

          return "Tap one Kannada tile and one English tile to make a match.";
        },

        getTileMeta(tileType, pairId) {
          if (State.matchedPairIds.has(pairId)) {
            return "Matched";
          }

          if (
            (tileType === "kannada" && State.selectedKannadaId === pairId) ||
            (tileType === "english" && State.selectedEnglishId === pairId)
          ) {
            return "Selected";
          }

          return "";
        },

        getEnglishRenderPairs() {
          if (State.isRoundComplete) {
            return State.round.kannadaPairs;
          }

          return State.round.englishPairs;
        },

        getAggregateSummary() {
          const allStats = Object.values(Storage.data ? Storage.data.stats : {});
          const totalWordsSeen = allStats.reduce((sum, stat) => sum + stat.seen, 0);
          const totalDirectCorrect = allStats.reduce(
            (sum, stat) => sum + stat.correct,
            0
          );
          const totalIncorrectWordTouches = allStats.reduce(
            (sum, stat) => sum + stat.incorrect,
            0
          );
          const totalForcedCompletions = allStats.reduce(
            (sum, stat) => sum + stat.forced_completion,
            0
          );
          const totalIncorrectAttempts = Math.floor(totalIncorrectWordTouches / 2);
          const directAttemptBase = totalDirectCorrect + totalIncorrectAttempts;
          const directAccuracy =
            directAttemptBase > 0
              ? Math.round((totalDirectCorrect / directAttemptBase) * 100)
              : null;

          return {
            totalWordsSeen,
            totalDirectCorrect,
            totalIncorrectAttempts,
            totalForcedCompletions,
            directAccuracy
          };
        },

        renderSummaryList(listElement, rows) {
          listElement.textContent = "";

          rows.forEach((row) => {
            const item = document.createElement("div");
            item.className = "summary-row";

            const label = document.createElement("span");
            label.textContent = row.label;

            const value = document.createElement("strong");
            value.textContent = row.value;

            item.append(label, value);
            listElement.appendChild(item);
          });
        },

        renderColumn(listElement, pairs, tileType) {
          listElement.textContent = "";

          pairs.forEach((item) => {
            const isKannada = tileType === "kannada";
            listElement.appendChild(
              UI.createTile({
                pairId: item.id,
                tileType,
                variant: isKannada ? "kannada-tile" : "english-tile",
                disabled: State.matchedPairIds.has(item.id),
                stateClasses: UI.getTileStateClasses(tileType, item.id),
                label: isKannada ? item.kannada : item.english,
                support: isKannada ? item.devanagari : "\u00a0",
                meta: UI.getTileMeta(tileType, item.id)
              })
            );
          });
        },

        render() {
          UI.renderColumn(UI.elements.kannadaList, State.round.kannadaPairs, "kannada");
          UI.renderColumn(
            UI.elements.englishList,
            UI.getEnglishRenderPairs(),
            "english"
          );

          UI.elements.datasetCount.textContent =
            State.matchedPairIds.size +
            " of " +
            AppConfig.roundSize +
            " pairs matched";
          UI.elements.statusMessage.textContent = UI.getStatusMessage();
          UI.elements.newRoundButton.textContent = State.isRoundComplete
            ? "Play Another Round"
            : "New Round";

          const aggregateSummary = UI.getAggregateSummary();

          UI.renderSummaryList(UI.elements.sessionSummary, [
            {
              label: "Rounds played",
              value: String(State.sessionSummary.roundsPlayed)
            },
            {
              label: "Words seen",
              value: String(State.sessionSummary.wordsSeen)
            },
            {
              label: "Direct correct",
              value: String(State.sessionSummary.directCorrectMatches)
            },
            {
              label: "Incorrect attempts",
              value: String(State.sessionSummary.incorrectAttempts)
            },
            {
              label: "Forced final pairs",
              value: String(State.sessionSummary.forcedCompletions)
            }
          ]);

          UI.renderSummaryList(UI.elements.aggregateSummary, [
            {
              label: "Words seen",
              value: String(aggregateSummary.totalWordsSeen)
            },
            {
              label: "Direct correct",
              value: String(aggregateSummary.totalDirectCorrect)
            },
            {
              label: "Incorrect attempts",
              value: String(aggregateSummary.totalIncorrectAttempts)
            },
            {
              label: "Forced final pairs",
              value: String(aggregateSummary.totalForcedCompletions)
            },
            {
              label: "Direct accuracy",
              value:
                aggregateSummary.directAccuracy === null
                  ? "—"
                  : aggregateSummary.directAccuracy + "%"
            }
          ]);
        }
      };

      const Engine = {
        resolveSelectionsIfReady() {
          if (!State.selectedKannadaId || !State.selectedEnglishId) {
            UI.render();
            return;
          }

          if (State.selectedKannadaId === State.selectedEnglishId) {
            const isForcedCompletion =
              State.matchedPairIds.size === AppConfig.roundSize - 1;

            Storage.markCorrectMatch(State.selectedKannadaId, {
              isForcedCompletion
            });
            if (isForcedCompletion) {
              State.sessionSummary.forcedCompletions += 1;
            } else {
              State.sessionSummary.directCorrectMatches += 1;
            }
            State.matchedPairIds.add(State.selectedKannadaId);
            State.clearSelections();
            State.isRoundComplete =
              State.matchedPairIds.size === AppConfig.roundSize;
            if (State.isRoundComplete) {
              State.sessionSummary.roundsPlayed += 1;
            }
            UI.render();
            return;
          }

          State.incorrectPairIds = new Set([
            State.selectedKannadaId,
            State.selectedEnglishId
          ]);
          State.isFeedbackLocked = true;
          State.sessionSummary.incorrectAttempts += 1;
          Storage.markIncorrectAttempt([
            State.selectedKannadaId,
            State.selectedEnglishId
          ]);
          UI.render();

          State.incorrectResetTimerId = window.setTimeout(() => {
            State.clearSelections();
            State.isFeedbackLocked = false;
            State.incorrectResetTimerId = null;
            UI.render();
          }, AppConfig.incorrectResetDelayMs);
        },

        selectTile(tileType, pairId) {
          if (
            State.isFeedbackLocked ||
            State.isRoundComplete ||
            State.matchedPairIds.has(pairId)
          ) {
            return;
          }

          if (tileType === "kannada") {
            State.selectedKannadaId =
              State.selectedKannadaId === pairId ? null : pairId;
          }

          if (tileType === "english") {
            State.selectedEnglishId =
              State.selectedEnglishId === pairId ? null : pairId;
          }

          Engine.resolveSelectionsIfReady();
        },

        startNewRound() {
          State.startNewRound();
          Storage.save();
          UI.render();
        }
      };

      const App = {
        handleTileActivation(event) {
          const tile = event.target.closest(".tile");

          if (!tile) {
            return;
          }

          Engine.selectTile(tile.dataset.tileType, tile.dataset.pairId);
        },

        handleKeydown(event) {
          if (event.key !== "Enter" && event.key !== " ") {
            return;
          }

          const tile = event.target.closest(".tile");

          if (!tile) {
            return;
          }

          event.preventDefault();
          Engine.selectTile(tile.dataset.tileType, tile.dataset.pairId);
        },

        init() {
          Storage.load();
          Storage.touchSession();
          Storage.markRoundSeen(State.round);
          State.sessionSummary.wordsSeen += State.round.kannadaPairs.length;
          document.addEventListener("click", App.handleTileActivation);
          document.addEventListener("keydown", App.handleKeydown);
          UI.elements.newRoundButton.addEventListener("click", Engine.startNewRound);
          UI.render();
        }
      };

      App.init();
    </script>
