<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kannada Words Match</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5efe4;
        --panel: rgba(255, 252, 246, 0.9);
        --panel-strong: #fffdf9;
        --border: #dbcdb3;
        --border-strong: #bfa46f;
        --text: #2b2116;
        --muted: #6f604c;
        --accent: #9d5c2f;
        --accent-soft: #f2dfc9;
        --selected: #f3cf9d;
        --selected-shadow: rgba(157, 92, 47, 0.24);
        --matched-bg: #dff3df;
        --matched-border: #67956b;
        --matched-text: #214526;
        --error-bg: #fbe0dc;
        --error-border: #bf5f4e;
        --error-text: #7d2e21;
        --shadow: 0 14px 36px rgba(90, 63, 28, 0.11);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", Avenir, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.75), transparent 35%),
          linear-gradient(180deg, #f8f2e8 0%, var(--bg) 55%, #efe4d1 100%);
        color: var(--text);
      }

      .app {
        width: min(100%, 1080px);
        margin: 0 auto;
        padding: 16px 14px 20px;
      }

      .hero,
      .board {
        background: var(--panel);
        border: 1px solid rgba(191, 164, 111, 0.35);
        border-radius: 22px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(8px);
      }

      .hero {
        padding: 14px 16px;
      }

      .hero-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.95rem, 4.2vw, 2.9rem);
        line-height: 0.96;
        letter-spacing: -0.03em;
      }

      .progress-count {
        flex: 0 0 auto;
        color: var(--muted);
        font-size: 0.95rem;
        font-weight: 700;
        white-space: nowrap;
      }

      .hero-controls {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 12px;
      }

      .hero-actions {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        flex: 0 0 auto;
      }

      .hero-status {
        min-width: 0;
        flex: 1 1 280px;
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.32;
      }

      .mode-row {
        display: inline-flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 10px;
        padding: 6px;
        border: 1px solid rgba(191, 164, 111, 0.28);
        border-radius: 999px;
        background: rgba(255, 251, 245, 0.72);
      }

      .mode-button {
        min-height: 34px;
        padding: 7px 13px;
        border-color: transparent;
        color: var(--accent);
        background: transparent;
        box-shadow: none;
        white-space: nowrap;
      }

      .mode-button:hover {
        background: rgba(242, 223, 201, 0.72);
        box-shadow: 0 4px 10px rgba(157, 92, 47, 0.08);
      }

      .mode-button.is-active {
        color: #fffaf2;
        border-color: rgba(255, 250, 242, 0.16);
        background: linear-gradient(180deg, #ad6938 0%, var(--accent) 100%);
        box-shadow: 0 7px 14px rgba(157, 92, 47, 0.16);
      }

      .summary-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        max-width: 620px;
        margin-top: 12px;
      }

      .summary-card {
        padding: 10px 12px;
        border: 1px solid rgba(191, 164, 111, 0.32);
        border-radius: 16px;
        background: rgba(255, 253, 249, 0.74);
      }

      .summary-title {
        margin: 0 0 8px;
        color: var(--text);
        font-size: 0.86rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .summary-list {
        display: grid;
        gap: 5px;
      }

      .summary-divider {
        height: 1px;
        margin: 10px 0;
        background: rgba(191, 164, 111, 0.26);
      }

      .summary-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        color: var(--muted);
        font-size: 0.88rem;
        line-height: 1.25;
      }

      .summary-row strong {
        color: var(--text);
        font-weight: 700;
      }

      .mastery-block {
        display: grid;
        gap: 7px;
      }

      .mastery-label {
        margin: 0;
        color: var(--muted);
        font-size: 0.88rem;
        line-height: 1.25;
      }

      .mastery-label strong {
        color: var(--text);
        font-weight: 700;
      }

      .mastery-bar {
        overflow: hidden;
        height: 8px;
        border-radius: 999px;
        background: rgba(191, 164, 111, 0.22);
      }

      .mastery-fill {
        height: 100%;
        width: 0%;
        border-radius: inherit;
        background: linear-gradient(90deg, #c38a4f 0%, #7ead76 100%);
        transition: width 180ms ease;
      }

      .board {
        margin-top: 12px;
        padding: 14px;
      }

      .board-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .column {
        min-width: 0;
      }

      .column-header {
        display: flex;
        align-items: baseline;
        justify-content: flex-start;
        gap: 0;
        margin-bottom: 8px;
      }

      .column-header h2 {
        margin: 0;
        font-size: 1rem;
      }

      .tile-list {
        display: grid;
        gap: 8px;
      }

      .tile {
        position: relative;
        overflow: hidden;
        padding: 12px 14px;
        border-radius: 16px;
        border: 1px solid var(--border);
        background: var(--panel-strong);
        cursor: pointer;
        transition:
          transform 160ms ease,
          border-color 160ms ease,
          box-shadow 160ms ease,
          background 160ms ease,
          opacity 160ms ease;
      }

      .tile:hover {
        transform: translateY(-1px);
      }

      .tile::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(157, 92, 47, 0.05), transparent 45%);
        pointer-events: none;
      }

      .tile.kannada-tile {
        background: linear-gradient(180deg, #fffdfa 0%, #faf2e4 100%);
      }

      .tile.english-tile {
        background: linear-gradient(180deg, #fffdfb 0%, #f7efe5 100%);
      }

      .tile.selected {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px var(--selected-shadow);
        background: linear-gradient(180deg, #fff5e8 0%, #f9e6ca 100%);
      }

      .tile.incorrect {
        border-color: var(--error-border);
        box-shadow: 0 0 0 4px rgba(191, 95, 78, 0.18);
        background: linear-gradient(180deg, var(--error-bg) 0%, #f8d4ce 100%);
        color: var(--error-text);
      }

      .tile.matched {
        border-color: var(--matched-border);
        background: linear-gradient(180deg, var(--matched-bg) 0%, #cfeccc 100%);
        color: var(--matched-text);
        box-shadow: 0 0 0 4px rgba(103, 149, 107, 0.14);
      }

      .tile.matched::after {
        background: linear-gradient(135deg, rgba(53, 123, 66, 0.1), transparent 50%);
      }

      .tile.disabled {
        cursor: default;
      }

      .tile.disabled:hover {
        transform: none;
      }

      .tile-label {
        margin: 0;
        font-size: clamp(1.14rem, 1.7vw, 1.26rem);
        font-weight: 700;
        line-height: 1.08;
      }

      .tile-support {
        min-height: 1.18em;
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 0.86rem;
        line-height: 1.18;
      }

      .tile-meta {
        display: none;
      }

      button {
        appearance: none;
        border: 1px solid rgba(255, 250, 242, 0.24);
        border-radius: 999px;
        padding: 10px 17px;
        min-height: 40px;
        font: inherit;
        font-weight: 700;
        letter-spacing: 0.01em;
        color: #fffaf2;
        background: linear-gradient(180deg, #ad6938 0%, var(--accent) 100%);
        cursor: pointer;
        opacity: 1;
        transition:
          transform 160ms ease,
          opacity 160ms ease,
          box-shadow 160ms ease,
          background 160ms ease,
          border-color 160ms ease;
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 18px rgba(157, 92, 47, 0.18);
      }

      button:focus-visible {
        outline: 3px solid rgba(157, 92, 47, 0.28);
        outline-offset: 3px;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.7;
        box-shadow: none;
      }

      button:disabled:hover {
        transform: none;
      }

      .button-secondary {
        color: var(--accent);
        background: linear-gradient(180deg, #f6e6d1 0%, var(--accent-soft) 100%);
        box-shadow: none;
      }

      .button-subtle {
        padding: 8px 12px;
        color: var(--muted);
        border-color: rgba(191, 164, 111, 0.28);
        background: rgba(255, 251, 245, 0.7);
        box-shadow: none;
      }

      .button-subtle:hover {
        color: var(--text);
        border-color: rgba(157, 92, 47, 0.18);
        background: rgba(255, 248, 240, 0.9);
        box-shadow: 0 4px 10px rgba(157, 92, 47, 0.08);
      }

      @media (min-width: 760px) {
        .app {
          padding: 14px 18px 16px;
        }

        .board-grid {
          grid-template-columns: 1fr 1fr;
          gap: 12px;
        }

        .hero {
          padding: 12px 16px 13px;
        }

        .board {
          padding: 12px 14px;
        }
      }

      @media (min-width: 1024px) {
        .app {
          padding-top: 12px;
          padding-bottom: 14px;
        }

        .hero {
          padding: 11px 15px 12px;
        }

        .board {
          padding: 12px;
        }

        .tile {
          padding: 11px 13px;
        }
      }

      @media (max-width: 759px) {
        .hero-header,
        .hero-controls {
          align-items: flex-start;
          flex-direction: column;
        }

        .hero-controls {
          gap: 10px;
        }

        .hero-actions {
          width: 100%;
          flex-wrap: wrap;
        }

        .mode-row {
          width: 100%;
          margin-top: 8px;
          border-radius: 18px;
        }

        .mode-button {
          flex: 1 1 calc(50% - 6px);
          justify-content: center;
          text-align: center;
        }
      }
    </style>
  </head>

    <main class="app">
      <section class="hero" aria-label="App introduction">
        <div class="hero-header">
          <h1>Kannada Words Match</h1>
          <span id="dataset-count" class="progress-count" aria-live="polite"></span>
        </div>
        <div class="hero-controls">
          <div class="hero-actions">
            <button id="new-round-button" type="button">New Round</button>
            <button id="reset-progress-button" class="button-subtle" type="button">
              Reset progress
            </button>
          </div>
          <p id="status-message" class="hero-status" role="status" aria-live="polite">
            Tap one Kannada tile and one English tile to make a match.
          </p>
        </div>
        <div class="mode-row" aria-label="Practice mode">
          <button
            id="mode-smart-mix"
            class="mode-button"
            type="button"
            data-round-source="smart_mix"
          >
            Mixed Practice
          </button>
          <button
            id="mode-mistakes"
            class="mode-button"
            type="button"
            data-round-source="mistakes"

            Recent Mistakes

          <button

            type="button"
            data-round-source="weak_words"

            Weak Words

        </div>
        <div class="summary-grid" aria-label="Learner summaries">
          <section class="summary-card" aria-labelledby="aggregate-summary-title">
            <h2 id="aggregate-summary-title" class="summary-title">Learning Progress</h2>
            <div id="aggregate-summary" class="summary-list" aria-live="polite"></div>
            <div class="summary-divider" aria-hidden="true"></div>
            <div class="mastery-block" aria-live="polite">
              <p id="mastery-label" class="mastery-label"></p>
              <div class="mastery-bar" aria-hidden="true">
                <div id="mastery-fill" class="mastery-fill"></div>
              </div>
            </div>
          </section>
        </div>
      </section>

      <section class="board" aria-label="Word matching board">
        <div class="board-grid">
          <section class="column" aria-labelledby="kannada-column-title">
            <div class="column-header">
              <h2 id="kannada-column-title">Kannada</h2>
            </div>
            <div id="kannada-list" class="tile-list" aria-live="polite"></div>
          </section>

          <section class="column" aria-labelledby="english-column-title">
            <div class="column-header">
              <h2 id="english-column-title">English</h2>
            </div>
            <div id="english-list" class="tile-list" aria-live="polite"></div>
          </section>
        </div>
      </section>
    </main>

        shuffle(items) {
          const copy = [...items];

          for (let index = copy.length - 1; index > 0; index -= 1) {
            const swapIndex = Math.floor(Math.random() * (index + 1));
            const current = copy[index];
            copy[index] = copy[swapIndex];
            copy[swapIndex] = current;
          }

          return copy;
        },

        getMaxIntroStage() {
          return Deck.curatedDeck.reduce(
            (highestStage, word) => Math.max(highestStage, word.intro_stage || 1),
            1
          );
        },

        getStageWords(stage) {
          return Deck.curatedDeck.filter((word) => (word.intro_stage || 1) === stage);
        },

        getRequiredMasteredCountForStage(stage) {
          const stageWords = Deck.getStageWords(stage);

          return Math.min(
            stageWords.length,
            AppConfig.stageUnlockMasteredWordsRequired
          );
        },

        isStageEstablished(stage) {
          const statsByWordId = Storage.data ? Storage.data.stats : {};
          const stageWords = Deck.getStageWords(stage);
          const requiredMasteredCount = Deck.getRequiredMasteredCountForStage(stage);
          const masteredCount = stageWords.reduce((count, word) => {
            const stat = statsByWordId[word.id];

            return Storage.isWordMastered(stat) ? count + 1 : count;
          }, 0);

          return stageWords.length > 0 && masteredCount >= requiredMasteredCount;
        },

        getHighestActiveIntroStage() {
          const maxIntroStage = Deck.getMaxIntroStage();
          let highestActiveStage = Math.min(
            AppConfig.initialActiveIntroStage,
            maxIntroStage
          );

          while (
            highestActiveStage < maxIntroStage &&
            Deck.isStageEstablished(highestActiveStage)
          ) {
            highestActiveStage += 1;
          }

          return highestActiveStage;
        },

        getActiveLearningWords() {
          const highestActiveStage = Deck.getHighestActiveIntroStage();

          return Deck.curatedDeck.filter(
            (word) => (word.intro_stage || 1) <= highestActiveStage
          );
        },

        takeUniqueWords(sourceWords, selectedWords, targetCount) {
          if (targetCount <= 0) {
            return [];
          }

          const selectedIds = new Set(selectedWords.map((word) => word.id));

          return Deck.shuffle(sourceWords)
            .filter((word) => !selectedIds.has(word.id))
            .slice(0, targetCount);
        },

        buildSmartMixRoundPool(poolParts) {
          const selectedWords = [];

          const addWords = (sourceWords, targetCount) => {
            const nextWords = Deck.takeUniqueWords(
              sourceWords,
              selectedWords,
              targetCount
            );

            selectedWords.push(...nextWords);
          };

          addWords(poolParts.reviewReadyWords, AppConfig.smartMixTargets.reviewReady);
          addWords(poolParts.weakWords, AppConfig.smartMixTargets.weakWords);

          const remainingSlotsBeforeNewWords = Math.max(
            0,
            AppConfig.roundSize - selectedWords.length
          );
          addWords(
            poolParts.unseenWords,
            Math.min(
              AppConfig.smartMixTargets.newWords,
              remainingSlotsBeforeNewWords
            )
          );

          if (selectedWords.length < AppConfig.roundSize) {
            addWords(
              [
                ...poolParts.reviewReadyWords,
                ...poolParts.weakWords,
                ...poolParts.unseenWords,
                ...poolParts.activeWords
              ],
              AppConfig.roundSize - selectedWords.length
            );
          }

          return selectedWords;
        },

        getWordPool(roundSource = AppConfig.defaultRoundSource) {
          const allWords = Deck.curatedDeck;
          const activeWords = Deck.getActiveLearningWords();
          const statsByWordId = Storage.data ? Storage.data.stats : {};

          const unseenWords = activeWords.filter((word) => {
            const stat = statsByWordId[word.id];
            return !stat || stat.seen === 0;
          });
          const reviewReadyWords = activeWords.filter((word) => {
            const stat = statsByWordId[word.id];

            return (
              stat &&
              stat.seen >= 2 &&
              (stat.incorrect > 0 || stat.direct_correct < 2)
            );
          });
          const mistakesWords = activeWords.filter((word) => {
            const stat = statsByWordId[word.id];
            return stat && stat.incorrect > 0;
          });
          const weakWords = activeWords.filter((word) => {
            const stat = statsByWordId[word.id];

            return (
              stat &&
              (stat.bucket <= 2 ||
                stat.incorrect > 0 ||
                (stat.seen >= 2 && stat.direct_correct < 2) ||
                stat.forced_completion >= 2)
            );
          });

          const uniqueById = (words) =>
            Array.from(new Map(words.map((word) => [word.id, word])).values());

          const smartMixWords = Deck.buildSmartMixRoundPool({
            activeWords,
            unseenWords,
            reviewReadyWords,
            weakWords
          });

          const poolMap = {
            full_deck: activeWords,
            unseen: unseenWords,
            review_ready: reviewReadyWords,
            mistakes: mistakesWords,
            weak_words: weakWords,
            smart_mix: uniqueById(smartMixWords)
          };

          const selectedPool = poolMap[roundSource] || poolMap.full_deck;

          if (selectedPool.length >= AppConfig.roundSize) {
            return selectedPool;
          }

          const fallbackPool = uniqueById([
            ...selectedPool,
            ...poolMap.smart_mix,
            ...activeWords
          ]);

          if (fallbackPool.length >= AppConfig.roundSize) {
            return fallbackPool;
          }

          return activeWords.length > 0 ? activeWords : allWords;
        },

        createRoundFromPool(pool) {
          const sourcePool =
            pool && pool.length > 0 ? pool : Deck.getWordPool("full_deck");
          const kannadaPairs = Deck.shuffle(sourcePool).slice(0, AppConfig.roundSize);
          let englishPairs = Deck.shuffle(kannadaPairs);

          while (
            AppConfig.roundSize > 1 &&
            englishPairs.every((pair, index) => pair.id === kannadaPairs[index].id)
          ) {
            englishPairs = Deck.shuffle(kannadaPairs);
          }

          return { kannadaPairs, englishPairs };
        },

        createRound(roundSource = AppConfig.defaultRoundSource) {
          return Deck.createRoundFromPool(Deck.getWordPool(roundSource));
        }

            const probeKey = "__kannada_match_storage_probe__";
            window.localStorage.setItem(probeKey, "1");
            window.localStorage.removeItem(probeKey);
            return true;

            return false;

        },

        createDefaultMeta() {
          return {
            schema_version: AppConfig.storageSchemaVersion,
            last_session_at: null,
            session_count: 0
          };
        },

        createDefaultSettings() {
          return {
            show_devanagari: true
          };
        },

        createDefaultStats() {
          return {};
        },

        createDefaultData() {
          return {
            meta: Storage.createDefaultMeta(),
            // Per-word learner stats will live here instead of being mixed into deck items.
            stats: Storage.createDefaultStats(),
            settings: Storage.createDefaultSettings()
          };
        },

        readJson(key) {
          try {
            const rawValue = window.localStorage.getItem(key);

            if (rawValue === null) {
              return { exists: false, value: null, isValid: true };
            }

            return {
              exists: true,
              value: JSON.parse(rawValue),
              isValid: true
            };
          } catch (_error) {
            return { exists: true, value: null, isValid: false };
          }
        },

        sanitizeMeta(rawMeta) {
          const fallbackMeta = Storage.createDefaultMeta();

          if (!rawMeta || typeof rawMeta !== "object" || Array.isArray(rawMeta)) {
            return {
              value: fallbackMeta,
              didRecover: true,
              isCompatible: false,
              sourceVersion: null
            };
          }

          if (
            rawMeta.schema_version !== 1 &&
            rawMeta.schema_version !== AppConfig.storageSchemaVersion
          ) {
            return {
              value: fallbackMeta,
              didRecover: true,
              isCompatible: false,
              sourceVersion: null
            };
          }

          return {
            value: {
              schema_version: AppConfig.storageSchemaVersion,
              last_session_at:
                typeof rawMeta.last_session_at === "string" ||
                rawMeta.last_session_at === null
                  ? rawMeta.last_session_at
                  : null,
              session_count:
                Number.isInteger(rawMeta.session_count) && rawMeta.session_count >= 0
                  ? rawMeta.session_count
                  : 0
            },
            didRecover: rawMeta.schema_version !== AppConfig.storageSchemaVersion,
            isCompatible: true,
            sourceVersion: rawMeta.schema_version
          };
        },

        sanitizeSettings(rawSettings) {
          const fallbackSettings = Storage.createDefaultSettings();

          if (
            !rawSettings ||
            typeof rawSettings !== "object" ||
            Array.isArray(rawSettings)
          ) {
            return { value: fallbackSettings, didRecover: true };
          }

          return {
            value: {
              show_devanagari:
                typeof rawSettings.show_devanagari === "boolean"
                  ? rawSettings.show_devanagari
                  : fallbackSettings.show_devanagari
            },
            didRecover: false
          };
        },

        sanitizeStats(rawStats, sourceVersion = AppConfig.storageSchemaVersion) {
          if (!rawStats || typeof rawStats !== "object" || Array.isArray(rawStats)) {
            return { value: Storage.createDefaultStats(), didRecover: true };
          }

          const sanitizedStats = {};

          Object.entries(rawStats).forEach(([wordId, entry]) => {
            if (!entry || typeof entry !== "object" || Array.isArray(entry)) {
              return;
            }

            sanitizedStats[wordId] = {
              seen: Number.isInteger(entry.seen) && entry.seen >= 0 ? entry.seen : 0,
              direct_correct:
                Number.isInteger(entry.direct_correct) && entry.direct_correct >= 0
                  ? entry.direct_correct
                  : sourceVersion === 1 &&
                      Number.isInteger(entry.correct) &&
                      entry.correct >= 0
                    ? entry.correct
                    : 0,
              incorrect:
                Number.isInteger(entry.incorrect) && entry.incorrect >= 0
                  ? entry.incorrect
                  : 0,
              forced_completion:
                Number.isInteger(entry.forced_completion) &&
                entry.forced_completion >= 0
                  ? entry.forced_completion
                  : 0,
              streak:
                Number.isInteger(entry.streak) && entry.streak >= 0 ? entry.streak : 0,
              bucket:
                Number.isInteger(entry.bucket)
                  ? Math.min(
                      AppConfig.leitnerBucketCount,
                      Math.max(1, entry.bucket)
                    )
                  : 1,
              last_seen_at:
                typeof entry.last_seen_at === "string" || entry.last_seen_at === null
                  ? entry.last_seen_at
                  : null,
              last_direct_correct_at:
                typeof entry.last_direct_correct_at === "string" ||
                entry.last_direct_correct_at === null
                  ? entry.last_direct_correct_at
                  : null,
              last_incorrect_at:
                typeof entry.last_incorrect_at === "string" ||
                entry.last_incorrect_at === null
                  ? entry.last_incorrect_at
                  : null,
              last_forced_completion_at:
                typeof entry.last_forced_completion_at === "string" ||
                entry.last_forced_completion_at === null
                  ? entry.last_forced_completion_at
                  : null,
              last_reviewed:
                typeof entry.last_reviewed === "string" || entry.last_reviewed === null
                  ? entry.last_reviewed
                  : null
            };
          });

          return {
            value: sanitizedStats,
            didRecover: sourceVersion !== AppConfig.storageSchemaVersion
          };
        },

        load() {
          if (!Storage.isAvailable()) {
            Storage.data = Storage.createDefaultData();
            return Storage.data;
          }

          const metaRecord = Storage.readJson(AppConfig.storageKeys.meta);
          const metaResult = Storage.sanitizeMeta(metaRecord.value);
          let didRecover =
            !metaRecord.exists || !metaRecord.isValid || metaResult.didRecover;
          const sourceVersion = metaResult.sourceVersion || AppConfig.storageSchemaVersion;

          let statsResult = {
            value: Storage.createDefaultStats(),
            didRecover: true
          };
          let settingsResult = {
            value: Storage.createDefaultSettings(),
            didRecover: true
          };

          if (metaResult.isCompatible) {
            const statsRecord = Storage.readJson(AppConfig.storageKeys.stats);
            const settingsRecord = Storage.readJson(AppConfig.storageKeys.settings);

            statsResult = Storage.sanitizeStats(statsRecord.value, sourceVersion);
            settingsResult = Storage.sanitizeSettings(settingsRecord.value);

            didRecover =
              didRecover ||
              !statsRecord.exists ||
              !statsRecord.isValid ||
              statsResult.didRecover ||
              !settingsRecord.exists ||
              !settingsRecord.isValid ||
              settingsResult.didRecover;
          } else {
            didRecover = true;
          }

          Storage.data = {
            meta: metaResult.value,
            stats: statsResult.value,
            settings: settingsResult.value
          };

          if (didRecover) {
            Storage.save();
          }

          return Storage.data;
        },

        touchSession() {
          if (!Storage.data) {
            Storage.data = Storage.createDefaultData();
          }

          Storage.data.meta.session_count += 1;
          Storage.data.meta.last_session_at = new Date().toISOString();
          Storage.save();
        },

        ensureWordStat(wordId) {
          if (!Storage.data) {
            Storage.data = Storage.createDefaultData();
          }

          if (!Storage.data.stats[wordId]) {
            // Keep the stat shape ready for later milestones, including recall-vs-elimination
            // distinctions for the final forced pair.
            Storage.data.stats[wordId] = {
              seen: 0,
              direct_correct: 0,
              incorrect: 0,
              forced_completion: 0,
              streak: 0,
              bucket: 1,
              last_seen_at: null,
              last_direct_correct_at: null,
              last_incorrect_at: null,
              last_forced_completion_at: null,
              last_reviewed: null
            };
          }

          return Storage.data.stats[wordId];
        },

        markRoundSeen(round) {
          if (!round) {
            return;
          }

          const seenAt = new Date().toISOString();

          round.kannadaPairs.forEach((pair) => {
            const stat = Storage.ensureWordStat(pair.id);
            stat.seen += 1;
            stat.last_seen_at = seenAt;
          });

          Storage.save();
        },

        markIncorrectAttempt(pairIds) {
          const reviewedAt = new Date().toISOString();

          pairIds.forEach((pairId) => {
            const stat = Storage.ensureWordStat(pairId);
            stat.incorrect += 1;
            stat.streak = 0;
            stat.bucket = 1;
            stat.last_incorrect_at = reviewedAt;
            stat.last_reviewed = reviewedAt;
          });

          Storage.save();
        },

        markCorrectMatch(pairId, options = {}) {
          const stat = Storage.ensureWordStat(pairId);
          const reviewedAt = new Date().toISOString();
          stat.last_reviewed = reviewedAt;

          if (options.isForcedCompletion) {
            stat.forced_completion += 1;
            stat.streak = 0;
            stat.last_forced_completion_at = reviewedAt;
          } else {
            stat.direct_correct += 1;
            stat.streak += 1;
            stat.last_direct_correct_at = reviewedAt;

            if (stat.streak >= AppConfig.leitnerPromotionStreak) {
              stat.bucket = Math.min(
                AppConfig.leitnerBucketCount,
                stat.bucket + 1
              );
              stat.streak = 0;
            }
          }

          Storage.save();
        },

        isWordMastered(stat) {
          const masteryThreshold = {
            seen: 3,
            directCorrect: 2,
            incorrect: 1,
            bucket: 4
          };

          return (
            stat &&
            stat.seen >= masteryThreshold.seen &&
            stat.direct_correct >= masteryThreshold.directCorrect &&
            stat.incorrect <= masteryThreshold.incorrect &&
            stat.bucket >= masteryThreshold.bucket
          );
        },

        clearProgress() {
          Storage.data = Storage.createDefaultData();

          if (!Storage.isAvailable()) {
            return;

          try {
            window.localStorage.removeItem(AppConfig.storageKeys.meta);
            window.localStorage.removeItem(AppConfig.storageKeys.stats);
            window.localStorage.removeItem(AppConfig.storageKeys.settings);
          } catch (_error) {
            // Ignore availability errors so reset never breaks the app.
          }
        },

        save() {
          if (!Storage.isAvailable() || !Storage.data) {
            return;
          }

          try {
            window.localStorage.setItem(
              AppConfig.storageKeys.meta,
              JSON.stringify(Storage.data.meta)
            );
            window.localStorage.setItem(
              AppConfig.storageKeys.stats,
              JSON.stringify(Storage.data.stats)
            );
            window.localStorage.setItem(
              AppConfig.storageKeys.settings,
              JSON.stringify(Storage.data.settings)
            );
          } catch (_error) {

          }
        }

              return count + 1;
            }

            return count;
          }, 0);
          const percent = deckSize > 0 ? Math.round((masteredCount / deckSize) * 100) : 0;

          return {
            masteredCount,
            deckSize,
            percent
          };
        },

        renderSummaryList(listElement, rows) {
          listElement.textContent = "";

          rows.forEach((row) => {
            const item = document.createElement("div");
            item.className = "summary-row";

            const label = document.createElement("span");
            label.textContent = row.label;

            const value = document.createElement("strong");
            value.textContent = row.value;

            item.append(label, value);
            listElement.appendChild(item);
          });
        },

        renderColumn(listElement, pairs, tileType) {
          listElement.textContent = "";

          pairs.forEach((item) => {
            const isKannada = tileType === "kannada";
            listElement.appendChild(
              UI.createTile({
                pairId: item.id,
                tileType,
                variant: isKannada ? "kannada-tile" : "english-tile",
                disabled: State.matchedPairIds.has(item.id),
                stateClasses: UI.getTileStateClasses(tileType, item.id),
                label: isKannada ? item.kannada : item.english,
                support: isKannada ? item.devanagari : "\u00a0",
                meta: UI.getTileMeta(tileType, item.id)
              })
            );
          });
        },

        render() {
          UI.renderColumn(UI.elements.kannadaList, State.round.kannadaPairs, "kannada");
          UI.renderColumn(
            UI.elements.englishList,
            UI.getEnglishRenderPairs(),
            "english"
          );

          UI.elements.datasetCount.textContent =
            State.matchedPairIds.size +
            " of " +
            AppConfig.roundSize +
            " pairs matched";
          UI.elements.statusMessage.textContent = UI.getStatusMessage();
          UI.elements.newRoundButton.textContent = State.isRoundComplete
            ? "Play Another Round"
            : "New Round";
          UI.elements.modeButtons.forEach((button) => {
            button.classList.toggle(
              "is-active",
              button.dataset.roundSource === State.roundSource
            );
          });

          const aggregateSummary = UI.getAggregateSummary();
          const stageIntroductionSummary = UI.getStageIntroductionSummary();
          const masterySummary = UI.getMasterySummary();

          UI.renderSummaryList(UI.elements.aggregateSummary, [
            {
              label: "Stages active",
              value: stageIntroductionSummary.activeStageLabel
            },
            {
              label: "Words seen",
              value:
                String(aggregateSummary.uniqueWordsSeen) +
                " / " +
                String(masterySummary.deckSize)
            },
            {
              label: "Direct recalls",
              value: String(aggregateSummary.totalDirectCorrect)
            },
            {
              label: "Recall rate",
              value:
                aggregateSummary.directAccuracy === null
                  ? "—"
                  : aggregateSummary.directAccuracy + "%"
            }
          ]);

          UI.elements.masteryLabel.innerHTML =
            "<strong>Mastery</strong> " +
            masterySummary.masteredCount +
            " / " +
            masterySummary.deckSize +
            " words mastered";
          UI.elements.masteryFill.style.width = masterySummary.percent + "%";
        }
      };

      const Engine = {
        resolveSelectionsIfReady() {
          if (!State.selectedKannadaId || !State.selectedEnglishId) {
            UI.render();
            return;
          }

          if (State.selectedKannadaId === State.selectedEnglishId) {
            const isForcedCompletion =
              State.matchedPairIds.size === AppConfig.roundSize - 1;

            Storage.markCorrectMatch(State.selectedKannadaId, {
              isForcedCompletion
            });
            if (isForcedCompletion) {
              State.sessionSummary.forcedCompletions += 1;
            } else {
              State.sessionSummary.directCorrectMatches += 1;
            }
            State.matchedPairIds.add(State.selectedKannadaId);
            State.clearSelections();
            State.isRoundComplete =
              State.matchedPairIds.size === AppConfig.roundSize;
            if (State.isRoundComplete) {
              State.sessionSummary.roundsPlayed += 1;
            }
            UI.render();
            return;
          }

          State.incorrectPairIds = new Set([
            State.selectedKannadaId,
            State.selectedEnglishId
          ]);
          State.isFeedbackLocked = true;
          State.sessionSummary.incorrectAttempts += 1;
          Storage.markIncorrectAttempt([
            State.selectedKannadaId,
            State.selectedEnglishId
          ]);
          UI.render();

          State.incorrectResetTimerId = window.setTimeout(() => {
            State.clearSelections();
            State.isFeedbackLocked = false;
            State.incorrectResetTimerId = null;
            UI.render();
          }, AppConfig.incorrectResetDelayMs);
        },

        selectTile(tileType, pairId) {
          if (
            State.isFeedbackLocked ||
            State.isRoundComplete ||
            State.matchedPairIds.has(pairId)
          ) {
            return;
          }

          if (tileType === "kannada") {
            State.selectedKannadaId =
              State.selectedKannadaId === pairId ? null : pairId;
          }

          if (tileType === "english") {
            State.selectedEnglishId =
              State.selectedEnglishId === pairId ? null : pairId;
          }

          Engine.resolveSelectionsIfReady();
        },

        startNewRound() {
          State.startNewRound();
          Storage.save();
          UI.render();
        },

        setRoundSource(roundSource) {
          State.roundSource = roundSource;
          Engine.startNewRound();
        },

        resetProgress() {
          const shouldReset = window.confirm(
            "Reset all Kannada Words Match progress on this device and start fresh?"
          );

          if (!shouldReset) {
            return;
          }

          Storage.clearProgress();
          App.init();
        }
      };

      const App = {
        didInit: false,
        handleTileActivation(event) {
          const tile = event.target.closest(".tile");

          if (!tile) {
            return;
          }

          Engine.selectTile(tile.dataset.tileType, tile.dataset.pairId);
        },

        handleKeydown(event) {
          if (event.key !== "Enter" && event.key !== " ") {
            return;
          }

          const tile = event.target.closest(".tile");

          if (!tile) {
            return;
          }

          event.preventDefault();
          Engine.selectTile(tile.dataset.tileType, tile.dataset.pairId);
        },

        handleModeChange(event) {
          const trigger = event.target.closest("[data-round-source]");

          if (!trigger) {
            return;
          }

          Engine.setRoundSource(trigger.dataset.roundSource);
        },

        init() {
          Storage.load();
          Storage.touchSession();
          State.roundSource = AppConfig.defaultRoundSource;
          State.round = Deck.createRound(State.roundSource);
          State.resetRoundUi();
          State.sessionSummary = {
            roundsPlayed: 0,
            wordsSeen: 0,
            directCorrectMatches: 0,
            incorrectAttempts: 0,
            forcedCompletions: 0
          };
          Storage.markRoundSeen(State.round);
          State.sessionSummary.wordsSeen += State.round.kannadaPairs.length;

          if (!App.didInit) {
            document.addEventListener("click", App.handleTileActivation);
            document.addEventListener("keydown", App.handleKeydown);
            UI.elements.modeButtons.forEach((button) => {
              button.addEventListener("click", App.handleModeChange);
            });
            UI.elements.newRoundButton.addEventListener("click", Engine.startNewRound);
            UI.elements.resetProgressButton.addEventListener(
              "click",
              Engine.resetProgress
            );
            App.didInit = true;
          }

          UI.render();
        }
      };

      App.init();
    </script>
  </body>
</html>
